name: Daily Benefit Data Auto Collector

on:
  push:
    branches:
      - main
  schedule:
    # 매일 한국 시간 밤 12시 (UTC 15:00) 정각에 자동 구동 설정
    - cron: '0 15 * * *'
  workflow_dispatch:
    # 깃허브 관리자 페이지에서 필요시 수동 강제 즉시 실행 버튼 활성화
    inputs:
      reason:
        description: 'Manual Trigger Reason'
        required: false
        default: 'Manual update check'

permissions:
  contents: write

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas openpyxl

    - name: Run Benefit Data Injector
      env:
        DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
      run: |
        # 공공 API 보안키를 환경변수로 주입받아 실시간 문화/정부혜택 데이터 수집 및 병합
        python inject_data.py
        # 디렉토리 안전 강제 생성 후 복사 진행
        mkdir -p test-app/public
        cp data.js test-app/public/data.js
        cp data.json test-app/public/data.json

    - name: Commit and Push Updated Data
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data.js data.json dist/web/data.js dist/web/data.json test-app/public/data.js test-app/public/data.json
        # 변경사항이 있는 경우에만 안전 커밋 및 푸시 가동
        git diff --quiet && git diff --staged --quiet || (
          git commit -m "chore: 공공데이터 일간 캘린더 데이터 자동 갱신 [skip ci]"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:main
        )

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Build AIT Package
      run: |
        # 신규 도입된 esbuild 기반 정적 빌드 및 번들링 실행
        npm install
        node build_static.js
        npx ait build

    - name: Deploy and Upload to Toss Partner Console
      env:
        AIT_ACCESS_TOKEN: ${{ secrets.AIT_ACCESS_TOKEN }}
      run: |
        # 정식 배포 명령 수행
        npx ait deploy
