<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공공 데이터 수집 마스터 대시보드</title>
  <!-- 구글 폰트 적용 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- 폰트어썸 아이콘 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- 대시보드 스타일 -->
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="app-container">
    <!-- 사이드바 -->
    <aside class="sidebar">
      <div class="logo-area">
        <i class="fa-solid fa-chart-pie logo-icon"></i>
        <h2>데이터 마스터</h2>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active"><i class="fa-solid fa-gauge"></i> 대시보드</a>
        <a href="#" class="nav-item" id="btn-raw-view"><i class="fa-solid fa-table"></i> 원천 데이터</a>
        <a href="https://developers-apps-in-toss.toss.im/" target="_blank" class="nav-item"><i class="fa-solid fa-book"></i> 토스 가이드</a>
      </nav>
      <div class="sidebar-footer">
        <p class="status-online"><span class="dot"></span> 실시간 데이터 연동 중</p>
      </div>
    </aside>

    <!-- 메인 본문 -->
    <main class="main-content">
      <!-- 헤더 -->
      <header class="main-header">
        <div class="header-title">
          <h1>정부혜택 & 축제 데이터 통계</h1>
          <p>전국 공공 API로부터 수집된 모든 원천 데이터셋을 실시간으로 감시 및 분석합니다.</p>
        </div>
        <!-- 파일 수동 로더 -->
        <div class="file-loader-zone" id="drop-zone">
          <i class="fa-solid fa-cloud-arrow-up"></i>
          <span>data.json 드래그 또는 클릭</span>
          <input type="file" id="file-input" accept=".json" style="display: none;">
        </div>
      </header>

      <!-- 통계 지표 카드 영역 -->
      <section class="metrics-grid">
        <div class="metric-card glass">
          <div class="metric-icon blue"><i class="fa-solid fa-database"></i></div>
          <div class="metric-info">
            <h3>총 수집 데이터</h3>
            <div class="value" id="val-total">0건</div>
          </div>
        </div>
        <div class="metric-card glass">
          <div class="metric-icon green"><i class="fa-solid fa-calendar-check"></i></div>
          <div class="metric-info">
            <h3>이번 달 예정 일정</h3>
            <div class="value" id="val-current-month">0건</div>
          </div>
        </div>
        <div class="metric-card glass">
          <div class="metric-icon purple"><i class="fa-solid fa-map-location-dot"></i></div>
          <div class="metric-info">
            <h3>등록 지자체 수</h3>
            <div class="value" id="val-regions">0개 지역</div>
          </div>
        </div>
      </section>

      <!-- 차트 시각화 영역 -->
      <section class="charts-grid">
        <div class="chart-card glass">
          <h3><i class="fa-solid fa-chart-donut"></i> 지역별 데이터 분포</h3>
          <div class="chart-container">
            <canvas id="chart-regions"></canvas>
          </div>
        </div>
        <div class="chart-card glass">
          <h3><i class="fa-solid fa-chart-column"></i> 카테고리/태그 빈도</h3>
          <div class="chart-container">
            <canvas id="chart-tags"></canvas>
          </div>
        </div>
      </section>

      <!-- 컨트롤러 & 데이터 그리드 테이블 영역 -->
      <section class="table-section glass">
        <div class="table-header">
          <div class="table-title-area">
            <h3><i class="fa-solid fa-list-check"></i> 수집 일정 목록</h3>
            <span class="badge" id="filtered-count">0건 필터됨</span>
          </div>
          <!-- 컨트롤 버튼 및 내보내기 -->
          <div class="action-buttons">
            <button class="btn btn-primary" id="btn-export-csv"><i class="fa-solid fa-file-excel"></i> 엑셀용 CSV 내보내기</button>
            <button class="btn btn-secondary" id="btn-export-json"><i class="fa-solid fa-file-code"></i> JSON 파일 내보내기</button>
          </div>
        </div>

        <!-- 필터링 제어 패널 -->
        <div class="filter-panel">
          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="filter-search" placeholder="혜택명, 지자체명, 내용 키워드 검색...">
          </div>
          <div class="filter-dropdowns">
            <select id="filter-sido">
              <option value="">시/도 전체</option>
            </select>
            <select id="filter-gugun" disabled>
              <option value="">시/군/구 전체</option>
            </select>
            <select id="filter-type">
              <option value="">전체 타입</option>
              <option value="축제">축제/행사</option>
              <option value="혜택">혜택/지원</option>
            </select>
          </div>
        </div>

        <!-- 테이블 그리드 -->
        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th style="width: 10%">지역</th>
                <th style="width: 25%">일정/혜택명</th>
                <th style="width: 12%">시작일</th>
                <th style="width: 12%">종료일</th>
                <th style="width: 10%">분류</th>
                <th style="width: 31%">해시태그 / 내용요약</th>
              </tr>
            </thead>
            <tbody id="table-body">
              <tr>
                <td colspan="6" class="table-empty">데이터를 불러오는 중입니다...</td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- 페이지네이션 컨트롤러 -->
        <div class="pagination" id="pagination-controls">
          <!-- JS로 동적 생성 -->
        </div>
      </section>
    </main>
  </div>

  <!-- 대시보드 비즈니스 로직 -->
  <script src="dashboard.js"></script>
</body>
</html>
