name: Daily Benefit Data Auto Collector

on:
  push:
    branches:
      - main
  schedule:
    # 매일 한국 시간 밤 12시 (UTC 15:00) 정각에 자동 구동 설정
    - cron: '0 15 * * *'
  workflow_dispatch:
    # 깃허브 관리자 페이지에서 필요시 수동 강제 즉시 실행 버튼 활성화
    inputs:
      reason:
        description: 'Manual Trigger Reason'
        required: false
        default: 'Manual update check'

permissions:
  contents: write

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas openpyxl

    - name: Run Benefit Data Injector
      env:
        DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
      run: |
        # 공공 API 보안키를 환경변수로 주입받아 실시간 문화/정부혜택 데이터 수집 및 병합
        python inject_data.py

    - name: Commit and Push Updated Data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data.js data.json
        # 변경사항이 있는 경우에만 안전 커밋 및 푸시 가동
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: 공공데이터 일간 캘린더 데이터 자동 갱신 [skip ci]" && git push)

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install Node Dependencies
      run: |
        npm install

    - name: Pre-Build Dummy Data Swap
      run: |
        # 18MB 대용량 데이터로 인한 Vite 빌드 OOM을 방지하기 위해 임시 백업 및 더미화
        cp data.js data_real.js
        cp data.json data_real.json
        echo "window.BENEFITS_DATA = {};" > data.js
        echo "{}" > data.json

    - name: Sync Assets to Public Directory
      run: |
        # Vite 빌드 시 대용량 파일(data.js 18MB)을 번들링하지 않고 그대로 복사하기 위해 public/ 동기화 (더미로 진행)
        mkdir -p public
        cp -f app.js public/app.js
        cp -f data.js public/data.js
        cp -f data.json public/data.json
        cp -f style.css public/style.css 2>/dev/null || true
        cp -f app_logo_main_1782592690933.png public/app_logo_main_1782592690933.png 2>/dev/null || true

    - name: Build Apps in Toss Mini-App
      run: |
        # 토스 전용 AIT 컴파일러 기동 (더미 데이터로 초고속 빌드 완료)
        npx ait build

    - name: Post-Build Restore Real Data for Linker Patch
      run: |
        # 링커 패치가 18MB 진짜 데이터를 주입할 수 있도록 백업본을 다시 data.js / data.json으로 원복
        cp -f data_real.js data.js
        cp -f data_real.json data.json

    - name: Vite Chunk Asset Double-Mount Patch
      run: |
        # Vite 컴파일 시 유실되는 에셋 청크 더블마운트 링커 패치 가동 (여기서 진짜 18MB 데이터 주입)
        node patch_ait.js govbenefit-hunter.ait

    - name: Deploy and Upload to Toss Partner Console
      env:
        # 배포 업로드용 API Key가 주입되어 기동됨
        TOSS_DEPLOY_TOKEN: ${{ secrets.TOSS_DEPLOY_TOKEN }}
      run: |
        # 최종 빌드된 AIT 바이너리를 토스 파트너 콘솔로 배포 자동 전송
        node trigger_deploy.js
