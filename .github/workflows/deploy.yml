name: Daily Benefit Data Auto Collector

on:
  push:
    branches:
      - main
  schedule:
    # 매일 한국 시간 밤 12시 (UTC 15:00) 정각에 자동 구동 설정
    - cron: '0 15 * * *'
  workflow_dispatch:
    # 깃허브 관리자 페이지에서 필요시 수동 강제 즉시 실행 버튼 활성화
    inputs:
      reason:
        description: 'Manual Trigger Reason'
        required: false
        default: 'Manual update check'

permissions:
  contents: write

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas openpyxl

    - name: Run Benefit Data Injector
      env:
        DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
      run: |
        # 공공 API 보안키를 환경변수로 주입받아 실시간 문화/정부혜택 데이터 수집 및 병합
        python inject_data.py

    - name: Commit and Push Updated Data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data.js data.json
        # 변경사항이 있는 경우에만 안전 커밋 및 푸시 가동
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: 공공데이터 일간 캘린더 데이터 자동 갱신 [skip ci]" && git push)

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Build AIT Package (Zero-Dependency Pure Builder)
      run: |
        # 외부 npm 패키지 없이 순수 Node.js 내장 모듈만으로 .ait 바이너리 직접 조립
        node build_ait_pure.js > build_pure.log 2>&1 || touch build_failed.flag
        cat build_pure.log
        if [ -f build_failed.flag ]; then
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build_pure.log
          git commit -m "chore: AIT 순수 빌드 오류 로그 업로드 [skip ci]" || true
          git push origin HEAD:main || true
          exit 1
        fi

    - name: Deploy and Upload to Toss Partner Console
      env:
        # 배포 업로드용 API Key가 주입되어 기동됨
        TOSS_DEPLOY_TOKEN: ${{ secrets.TOSS_DEPLOY_TOKEN }}
      run: |
        # 최종 빌드된 AIT 바이너리를 토스 파트너 콘솔로 배포 자동 전송
        node trigger_deploy.js
